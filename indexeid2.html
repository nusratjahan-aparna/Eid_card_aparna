<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Eid Metaverse - Contest Winner Edition</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Orbitron:wght@700&family=Poppins:ital,wght@1,400;1,600&family=Dancing+Script:wght@700&family=Cinzel:wght@700&family=Satisfy&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #ffdf00;
            --cyan: #00f3ff;
            --pink: #ff00ff;
            --deep-space: #01040a;
        }

        /* Standard cursor hidden for Magic Particles */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            height: 100vh;
            background: var(--deep-space);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2500px;
            font-family: 'Poppins', sans-serif;
        }

        /* --- 3D CELESTIAL BACKGROUND --- */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -3; }

        /* Bright 3D Moon on the Right Side */
        .side-moon-3d {
            position: fixed;
            top: 15%; right: 8%;
            width: 180px; height: 180px;
            background: transparent;
            border-radius: 50%;
            box-shadow: -25px 25px 0 0 var(--gold); /* Bold Crescent Shape */
            z-index: -1;
            filter: drop-shadow(0 0 50px var(--gold));
            transform: rotate(-20deg);
            animation: moonFloat 5s infinite alternate ease-in-out;
        }

        @keyframes moonFloat {
            from { transform: rotate(-20deg) translateY(0); filter: brightness(1) drop-shadow(0 0 30px var(--gold)); }
            to { transform: rotate(-15deg) translateY(-25px); filter: brightness(1.3) drop-shadow(0 0 60px var(--gold)); }
        }

        /* --- MAGIC RAINBOW SPARKLE CURSOR --- */
        .sparkle {
            position: fixed;
            width: 12px; height: 12px;
            pointer-events: none;
            z-index: 10000;
            border-radius: 50%;
            animation: sparkleOut 0.8s forwards;
        }
        @keyframes sparkleOut {
            0% { transform: scale(1); opacity: 1; filter: brightness(2); }
            100% { transform: scale(4) translate(30px, 30px); opacity: 0; }
        }

        /* --- 3D CARD STAGE --- */
        .stage {
            width: 380px; height: 550px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .card {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            border-radius: 40px;
        }

        .card.open { transform: rotateY(-180deg); }

        .face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 40px;
            border: 2px solid rgba(255, 223, 0, 0.3);
            overflow: hidden;
        }

        /* --- FRONT PAGE: DOLL & DOVE (Like Image) --- */
        .front {
            background: linear-gradient(135deg, #020d14, #003333);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .dove {
            position: absolute;
            top: 20px; right: 40px;
            font-size: 55px;
            animation: birdFly 4s infinite ease-in-out;
            transform: translateZ(60px);
        }

        /* The Doll Element as requested */
        .doll {
            position: absolute;
            bottom: 40px; left: 30px;
            font-size: 70px;
            animation: dollSway 3s infinite ease-in-out;
            transform: translateZ(80px);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        @keyframes birdFly { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-20px) rotate(5deg); } }
        @keyframes dollSway { 0%, 100% { transform: rotate(8deg); } 50% { transform: rotate(-8deg); } }

        .front-content { text-align: center; margin-top: 130px; transform: translateZ(120px); }
        .front-content h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            color: var(--gold);
            line-height: 0.8;
            margin-bottom: 20px;
        }

        .hint {
            margin-top: 40px;
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 5px;
            animation: blink 2s infinite;
        }

        /* --- BACK PAGE: FONT CHANGER & SURPRISE --- */
        .back {
            background: rgba(255, 255, 255, 0.96);
            transform: rotateY(180deg);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #111;
        }

        .avatar-box {
            width: 150px; height: 150px;
            background: linear-gradient(45deg, var(--pink), var(--cyan));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 80px; margin-bottom: 25px;
            border: 5px solid #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transform: translateZ(60px);
        }

        #wish-text {
            font-size: 1.3rem;
            font-style: italic;
            min-height: 110px;
            color: #222;
            line-height: 1.5;
            transition: 0.5s;
        }

        .controls { display: flex; gap: 15px; margin-top: 25px; transform: translateZ(80px); }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
            cursor: pointer;
            pointer-events: auto;
            transition: 0.3s;
        }
        .btn-style { background: #333; color: #fff; }
        .btn-magic { background: var(--gold); color: #000; box-shadow: 0 5px 15px rgba(255, 223, 0, 0.4); }
        .btn:hover { transform: scale(1.1); }

        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <!-- Galactic Background with Twinkling Stars -->
    <canvas id="bg-canvas"></canvas>
    <div class="side-moon-3d"></div>

    <div class="stage" id="stage">
        <div class="card" id="card">
            
            <!-- FRONT SIDE -->
            <div class="face front">
                <div class="dove">🕊️</div>
                <div class="doll">👧</div> <!-- Doll character as requested -->
                
                <div style="font-size: 80px; filter: drop-shadow(0 0 25px var(--gold));">🕌</div>
                
                <div class="front-content">
                    <h1>Eid</h1>
                    <h1 style="font-size: 3.8rem; margin-top: -15px; color: #fff;">Mubarak</h1>
                    <p class="hint">TAP TO REVEAL MAGIC</p>
                </div>
                
                <div style="position: absolute; top: 15px; left: 25px; font-size: 40px; animation: birdFly 4s infinite;">🏮</div>
            </div>

            <!-- BACK SIDE -->
            <div class="face back">
                <div class="avatar-box">🕌</div>
                <h2 style="font-family: 'Great Vibes'; font-size: 3rem; color: #004d40;">Happy Eid!</h2>
                
                <p id="wish-text"></p> <!-- Typewriter text -->
                
                <div class="controls">
                    <button class="btn btn-style" onclick="changeStyle(event)">Font Change 🔠</button>
                    <button class="btn btn-magic" onclick="doSurprise(event)">Surprise ✨</button>
                </div>
            </div>

        </div>
    </div>

    <!-- External Library for Surprise Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <script>
        const card = document.getElementById('card');
        const stage = document.getElementById('stage');
        const wishEl = document.getElementById('wish-text');
        
        const message = "May this Eid bring you endless joy, peace, and prosperity. Let your coding dreams come true and stay blessed always. Eid Mubarak to you and your family!";
        const fonts = ["'Poppins'", "'Great Vibes'", "'Dancing Script'", "'Cinzel'", "'Satisfy'", "'Orbitron'"];
        let fIndex = 0;

        // 1. UNIVERSAL RAINBOW MAGIC CURSOR (Particles)
        document.addEventListener('mousemove', (e) => {
            for(let i=0; i<3; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = e.clientX + 'px';
                s.style.top = e.clientY + 'px';
                const colors = ['#ffdf00', '#ff00ff', '#00f3ff', '#ffffff', '#00ff00', '#ff4500'];
                s.style.background = colors[Math.floor(Math.random() * colors.length)];
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 800);
            }

            // 3D Tilt Stage effect
            if(!card.classList.contains('open')) {
                const x = (window.innerWidth / 2 - e.pageX) / 25;
                const y = (window.innerHeight / 2 - e.pageY) / 25;
                stage.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
            }
        });

        // 2. OPEN CARD & START TYPEWRITER
        card.addEventListener('click', (e) => {
            if(e.target.tagName === 'BUTTON') return;
            const isOpen = card.classList.toggle('open');
            if(isOpen) {
                stage.style.transform = `rotateY(0deg) rotateX(0deg)`;
                typeWriter();
            } else {
                wishEl.innerHTML = "";
            }
        });

        function typeWriter() {
            let i = 0;
            wishEl.innerHTML = "";
            function type() {
                if (i < message.length) {
                    wishEl.innerHTML += message.charAt(i);
                    i++;
                    setTimeout(type, 45);
                }
            }
            setTimeout(type, 1000);
        }

        // 3. FONT CHANGER BUTTON
        function changeStyle(e) {
            e.stopPropagation();
            fIndex = (fIndex + 1) % fonts.length;
            wishEl.style.fontFamily = fonts[fIndex];
            wishEl.style.fontStyle = "italic";
            
            // UI Feedback
            wishEl.style.transform = "scale(1.1)";
            setTimeout(() => wishEl.style.transform = "scale(1)", 200);
        }

        // 4. SURPRISE BUTTON (Confetti)
        function doSurprise(e) {
            e.stopPropagation();
            confetti({
                particleCount: 200,
                spread: 120,
                origin: { y: 0.6 },
                colors: ['#ffdf00', '#ff00ff', '#00f3ff', '#ffffff']
            });
        }

        // 5. STARRY BACKGROUND ANIMATION (Canvas)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function initStars() {
            stars = [];
            for(let i=0; i<200; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    opacity: Math.random(),
                    speed: Math.random() * 0.03
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
                s.opacity += s.speed;
                if(s.opacity > 1 || s.opacity < 0) s.speed *= -1;
            });
            requestAnimationFrame(drawStars);
        }
        initStars();
        drawStars();
    </script>
</body>
</html>
