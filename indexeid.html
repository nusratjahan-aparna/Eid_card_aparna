<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Mubarak Card</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0d3c3c;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:700px;
height:400px;
display:flex;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.left{
background:white;
width:50%;
padding:40px;
text-align:center;
position:relative;
}

.right{
width:50%;
background:linear-gradient(#0d5c5c,#063333);
position:relative;
}

h1{
color:#0d5c5c;
font-size:40px;
margin-bottom:30px;
}

.message{
font-size:18px;
color:#333;
margin-top:30px;
}

.lantern{
width:60px;
height:100px;
background:gold;
margin:auto;
border-radius:10px;
animation:swing 3s infinite ease-in-out;
}

@keyframes swing{
0%{transform:rotate(-5deg)}
50%{transform:rotate(5deg)}
100%{transform:rotate(-5deg)}
}

.moon{
width:120px;
height:120px;
background:#f5d76e;
border-radius:50%;
position:absolute;
top:40px;
right:80px;
box-shadow:0 0 25px #f5d76e;
}

.stars{
position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3}
to{opacity:1}
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#0d5c5c;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<div class="left">

<h1 id="title">Eid Mubarak</h1>

<div class="lantern"></div>

<p class="message" id="msg">
Wishing you and your family a joyful Eid filled with happiness.
</p>

<button onclick="changeMessage()">Change Wish</button>

</div>

<div class="right">

<div class="moon"></div>

<div class="stars" style="top:60px;left:40px"></div>
<div class="stars" style="top:120px;left:120px"></div>
<div class="stars" style="top:200px;left:80px"></div>

</div>

</div>

<script>

function changeMessage(){

let wishes=[
"Eid Mubarak! May Allah bless you.",
"Have a joyful Eid with your family.",
"Peace, happiness and prosperity this Eid."
]

let random=Math.floor(Math.random()*wishes.length)

document.getElementById("msg").innerText=wishes[random]

}

</script>

</body>
</html>
